name: Leak Gate

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  leak-check:
    name: Sealed-mechanics leak check
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Run leak_check.py
        run: python3 tools/leak_check.py
